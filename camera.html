<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Lab Camera</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="camera.css">
</head>
<body>

    <div class="liquid-background">
        <div class="light-orb orb-1"></div>
        <div class="light-orb orb-2"></div>
        <div class="light-orb orb-3"></div>
    </div>

    <nav class="glass-nav">
        <div class="nav-logo"><a href="index.html" style="color:inherit;text-decoration:none;">Ali Ghavampour</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
        </ul>
        <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">
            <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="moon-icon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </nav>

    <main class="camera-page">
        <section class="camera-shell">
            <h1>Lab Camera</h1>
            <p class="camera-subtitle">Private live view. Password required.</p>

            <div id="camera-login" class="camera-login">
                <form id="login-form">
                    <label for="viewer-password">Viewer password</label>
                    <input id="viewer-password" type="password" autocomplete="current-password" required>
                    <p id="login-error" class="camera-error" role="alert"></p>
                    <button type="submit">View stream</button>
                </form>
            </div>

            <div id="camera-viewer" class="camera-viewer">
                <img id="camera-stream" class="stream-frame" alt="Live lab camera stream">
                <p id="stream-status" class="stream-status">Connecting...</p>
                <div class="stream-actions">
                    <button id="reload-stream-btn" type="button">Reload stream</button>
                    <button id="logout-btn" type="button">Log out</button>
                </div>
            </div>
        </section>
    </main>

    <script src="camera-config.js"></script>
    <script src="script.js"></script>
    <script src="camera.js"></script>
</body>
</html>
