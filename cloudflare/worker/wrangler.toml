name = "lab-camera-auth"
main = "worker.js"
compatibility_date = "2024-06-01"

# Set your Cloudflare account ID: wrangler whoami
# account_id = "your-account-id"

routes = [
  { pattern = "cam.alighavam.com/*", zone_name = "alighavam.com" }
]

# Create once: wrangler kv namespace create WATCHER_KV
# Paste the returned id below, then wrangler deploy
[[kv_namespaces]]
binding = "WATCHER_KV"
id = "842f6030a48c4e1b8ac472230ec95744"
