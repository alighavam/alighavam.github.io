# Cloudflare Tunnel config — copy to your lab computer.
# See CAMERA_SETUP.md for full setup steps.
#
# 1. Copy this file to: ~/.cloudflared/config.yml
# 2. Replace TUNNEL_ID, credentials path, hostname, and ESP32 IP.

tunnel: YOUR_TUNNEL_UUID
credentials-file: /Users/YOUR_USER/.cloudflared/YOUR_TUNNEL_UUID.json

ingress:
  # Caddy on lab Mac rewrites /stream → go2rtc (see cloudflare/go2rtc/README.md)
  - hostname: cam.yourdomain.com
    service: http://127.0.0.1:8080
  - service: http_status:404
